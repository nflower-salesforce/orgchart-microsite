// Cycle a link through: reports(confirmed) → reports(inferred) → works-with → …
async function cycleEdgeType(e) {
  hideEdgeControls();
  const child = byId.get(e.dstId), parent = byId.get(e.srcId);
  if (!child || !parent) return;
  try {
    if (!e.works && e.conf === "confirmed") {
      await persistEdgeChange(child, { reportsTo: parent.id, reportingConfidence: "inferred", worksWith: child.worksWith });
    } else if (!e.works && e.conf === "inferred") {
      // becomes works-with: drop the reporting line, add a works-with pair
      const ww = Array.from(new Set([...(child.worksWith || []), parent.id]));
      await persistEdgeChange(child, { reportsTo: null, worksWith: ww });
    } else {
      // works-with → reports(confirmed): set child→parent reporting, drop the pair
      if (wouldCycle(child.id, parent.id)) { toast("That would create a reporting loop", true); rebuildGraphSoft(); return; }
      const ww = (child.worksWith || []).filter((w) => w !== parent.id);
      await persistEdgeChange(child, { reportsTo: parent.id, reportingConfidence: "confirmed", worksWith: ww });
    }
    rebuildGraphSoft();
  } catch (err) { toast(err.message, true); }
}
async function removeEdge(e) {
  hideEdgeControls();
  const child = byId.get(e.dstId), parent = byId.get(e.srcId);
  if (!child) return;
  try {
    if (e.works) {
      const ww = (child.worksWith || []).filter((w) => w !== e.srcId);
      const ww2 = (parent.worksWith || []).filter((w) => w !== e.dstId);
      await persistEdgeChange(child, { worksWith: ww });
      if (parent && (parent.worksWith || []).includes(e.dstId)) await persistEdgeChange(parent, { worksWith: ww2 });
    } else {
      await persistEdgeChange(child, { reportsTo: null });
    }
    rebuildGraphSoft();
  } catch (err) { toast(err.message, true); }
}
// Save a partial change to a person (merged onto their full record) and update local cache.
async function persistEdgeChange(person, patch) {
  const body = { ...person, ...patch };
  const data = await api("PUT", "/api/stakeholders/" + encodeURIComponent(person.id), body);
  upsert(data.stakeholder);
}
function wouldCycle(childId, newParentId) {
  // walk up from newParent; if we reach child, it's a cycle
  let cur = newParentId, guard = 0;
  while (cur && guard++ < 999) {
    if (cur === childId) return true;
    cur = (byId.get(cur) || {}).reportsTo;
  }
  return false;
}

// ── Link draw: click + on a card, drag a handle onto a target card ──
let linkDraw = null; // { from, lineEl, handleEl }
function startLinkDraw(n) {
  hideCardControls();
  hideEdgeControls();
  $("#graph").classList.add("linking"); // edge hit-paths go inert during the draw
  linkDraw = { from: n, target: null };
  const line = el("path", { class: "draft-link" });
  const handle = el("circle", { class: "draft-handle", r: 8, fill: "#fff", stroke: "var(--usaa-navy)", "stroke-width": 2 });
  gOverlay.appendChild(line); gOverlay.appendChild(handle);
  linkDraw.lineEl = line; linkDraw.handleEl = handle;
  // start the handle just below the source card
  linkDraw.hx = n.x; linkDraw.hy = n.y + NH / 2 + 40;
  drawDraftLink();
  toast("Drag the handle onto a person to set their manager");

  const svg = $("#graph");
  const move = (ev) => {
    const g2 = toGraph(ev.clientX, ev.clientY);
    linkDraw.hx = g2.x; linkDraw.hy = g2.y;
    // highlight a card under the pointer (excluding the source)
    const el2 = document.elementFromPoint(ev.clientX, ev.clientY);
    const card = el2 && el2.closest(".node-card");
    const tid = card && card.getAttribute("data-id");
    setDropTarget(tid && tid !== n.id ? tid : null);
    drawDraftLink();
  };
  const up = async (ev) => {
    svg.removeEventListener("pointermove", move);
    window.removeEventListener("pointerup", up);
    const target = linkDraw.target;
    endLinkDraw();
    if (target) await attachReportingLink(target, n.id);
  };
  svg.addEventListener("pointermove", move);
  window.addEventListener("pointerup", up);
}
function setDropTarget(tid) {
  if (linkDraw.target === tid) return;
  if (linkDraw.target) { const prev = nodes.find((x) => x.id === linkDraw.target); if (prev && prev.elm) prev.elm.classList.remove("drop-ok"); }
  linkDraw.target = tid;
  if (tid) { const nn = nodes.find((x) => x.id === tid); if (nn && nn.elm) nn.elm.classList.add("drop-ok"); }
}
function drawDraftLink() {
  if (!linkDraw) return;
  const s = linkDraw.from;
  const x1 = s.x, y1 = s.y + NH / 2, x2 = linkDraw.hx, y2 = linkDraw.hy, my = (y1 + y2) / 2;
  linkDraw.lineEl.setAttribute("d", `M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`);
  linkDraw.handleEl.setAttribute("cx", x2); linkDraw.handleEl.setAttribute("cy", y2);
}
function endLinkDraw() {
  if (!linkDraw) return;
  // Clear ALL drop-ok highlights defensively (not just the tracked target).
  if (gNodes) gNodes.querySelectorAll(".node-card.drop-ok").forEach((el) => el.classList.remove("drop-ok"));
  linkDraw.lineEl.remove(); linkDraw.handleEl.remove();
  linkDraw = null;
  $("#graph").classList.remove("linking");
}
// The "+" starts a link FROM n as the manager; dropping on target makes target report to n.
async function attachReportingLink(targetId, managerId) {
  if (targetId === managerId) return;
  const target = byId.get(targetId);
  if (!target) return;
  if (wouldCycle(managerId, targetId)) { toast("That would create a reporting loop", true); return; }
  try {
    await persistEdgeChange(target, { reportsTo: managerId, reportingConfidence: "confirmed" });
    rebuildGraphSoft();
    toast(`${target.name} now reports to ${byId.get(managerId).name}`);
  } catch (err) { toast(err.message, true); }
}

// ════════════════════════════ Workstream filter menu ════════════════════════════

  let h = "";

  h += rrow("Category", `<span class="pill muted">${esc(CAT_LABEL[p.cat] || p.cat)}</span>`);
  if (mgr) {
    const badge = p.reportingConfidence === "confirmed" ? `<span class="badge confirmed">confirmed</span>` : `<span class="badge inferred">inferred</span>`;
    h += rrow("Reports to", `<span class="link-pill" data-goto="${esc(mgr.id)}">${esc(mgr.name)} &rarr;</span> ${badge}`);
  } else {
    h += rrow("Reports to", `<span class="badge unknown">unknown</span>`);

  if (directs.length) h += rrow(`Directs (${directs.length})`, `<div class="stacked">${directs.map(d=>`<span class="link-pill" data-goto="${esc(d.id)}">${esc(d.name)} &rarr;</span>`).join("")}</div>`);
  h += `</div>`;

  // Workstreams
  if (p.workstreams && p.workstreams.length) {
    const pills = p.workstreams.map(w => `<span class="pill" style="background:${WS_COLOR[w]||NO_WS}">${esc(wsLabel[w] || w)}</span>`).join("");
    h += `<div class="read-section"><h3>Workstreams</h3>${pills}</div>`;
  }

  // Works with
  if (collaborators.length || alsoWorkWith.length) {
    const all = [...collaborators, ...alsoWorkWith];
    h += `<div class="read-section"><h3>Works with</h3><div class="stacked">${all.map(c=>`<span class="link-pill" data-goto="${esc(c.id)}">${esc(c.name)} &rarr;</span>`).join("")}</div></div>`;
  }

  showDrawer();
}

    .map(p => `<option value="${esc(p.id)}"${p.id===selectedId?" selected":""}>${esc(p.name)}${p.title?" — "+esc(trim(p.title,30)):""}</option>`).join("");

  $("#save-btn").onclick = () => doSave(id);
  $("#cancel-btn").onclick = () => openRead(id);
  showDrawer(); $("#f-name").focus();
}
function openCreate() {
  current = null; editWorks = [];
  $("#drawer-name").textContent = "Add person"; $("#drawer-sub").textContent = "";
  $("#drawer-body").innerHTML = formHtml({ cat: "unplaced", reportingConfidence: "inferred" }) +
    `<div class="drawer-actions"><button class="btn" id="save-btn">Add to map</button><button class="btn btn--ghost" id="cancel-btn">Cancel</button></div>`;
  renderWorksPicker(null);
  $("#save-btn").onclick = doCreate;
  $("#cancel-btn").onclick = closeDrawer;
  showDrawer(); $("#f-name").focus();
}

// ════════════════════════════ Mutations ════════════════════════════
async function doSave(id) {
  const body = readForm(id);
  if (!body.name) { toast("Name is required", true); return; }
  try { const data = await api("PUT", "/api/stakeholders/" + encodeURIComponent(id), body); upsert(data.stakeholder); rebuildGraphSoft(); openRead(id); toast("Saved"); }
  catch (e) { toast(e.message, true); }
}
async function doCreate() {
  const body = readForm(null);
  if (!body.name) { toast("Name is required", true); return; }
  try { const data = await api("POST", "/api/stakeholders", body); upsert(data.stakeholder); rebuildGraphSoft(); openRead(data.stakeholder.id); toast("Added"); }
  catch (e) { toast(e.message, true); }
}

// Add a new direct report under `managerId`, then make its name editable on the
// card (Enter or blur saves; Escape on an unnamed new card removes it).
const PLACEHOLDER_NAME = "New person";
async function addReport(managerId) {
  hideCardControls();
  const mgr = byId.get(managerId);
  if (!mgr) return;
  try {
    const data = await api("POST", "/api/stakeholders", {
      name: PLACEHOLDER_NAME, reportsTo: managerId, reportingConfidence: "confirmed", cat: mgr.cat || "unplaced"
    });
    upsert(data.stakeholder);
    // If the manager's subtree was collapsed, expand it so the new card shows.
    if (collapsed.has(managerId)) collapsed.delete(managerId);
    rebuildGraphSoft();
    setTimeout(() => startNameEdit(data.stakeholder.id, true), 30);
  } catch (e) { toast(e.message, true); }
}

// Inline name editor: overlay an HTML input (via foreignObject) on the card's
// name, transforming with the card. `isNew` removes the card if left empty.
let nameEditing = null;
function startNameEdit(id, isNew) {
  const n = nodes.find((x) => x.id === id);
  if (!n || !n.elm) return;
  if (nameEditing) nameEditing.commit();

  const cw = cardW(), ch = cardH();
  const fo = el("foreignObject", { x: -cw/2 + 8, y: -ch/2 + 7, width: cw - 16, height: 19, class: "name-edit-fo" });
  const input = document.createElement("input");
  input.type = "text";
  input.className = "name-edit-input";
  input.value = isNew ? "" : (byId.get(id)?.name || "");
  input.placeholder = "Name…";
  fo.appendChild(input);
  n.elm.appendChild(fo);
  // hide the static name (rect: .nm text; square: the whole .sqcard) while editing
  const nmText = n.elm.querySelector(".nm") || n.elm.querySelector(".sqcard");
  if (nmText) nmText.style.visibility = "hidden";

  let done = false;
  const cleanup = () => { fo.remove(); if (nmText) nmText.style.visibility = ""; nameEditing = null; };
  const commit = async () => {
    if (done) return; done = true;
    const val = input.value.trim();
    const p = byId.get(id);
    if (!val) {
      if (isNew) { // discard an unnamed brand-new card
        try { await api("DELETE", "/api/stakeholders/" + encodeURIComponent(id)); } catch (e) {}
        people = people.filter((x) => x.id !== id);
        byId = new Map(people.map((q) => [q.id, q]));
        cleanup(); rebuildGraphSoft();
        return;
      }
      cleanup(); return; // existing card: leave name unchanged
    }
    cleanup();
    if (p && val !== p.name) {
      try { const data = await api("PUT", "/api/stakeholders/" + encodeURIComponent(id), { ...p, name: val }); upsert(data.stakeholder); rebuildGraphSoft(); }
      catch (e) { toast(e.message, true); }
    }
  };
  const cancel = async () => {
    if (done) return; done = true;
    if (isNew && !byId.get(id)?.name) { /* treat like empty */ }
    cleanup();
    if (isNew) { // brand-new + cancelled → remove it
      try { await api("DELETE", "/api/stakeholders/" + encodeURIComponent(id)); } catch (e) {}
      people = people.filter((x) => x.id !== id);
      byId = new Map(people.map((q) => [q.id, q]));
      rebuildGraphSoft();
    }
  };
  input.addEventListener("keydown", (e) => {
    e.stopPropagation();
    if (e.key === "Enter") { e.preventDefault(); commit(); }
    else if (e.key === "Escape") { e.preventDefault(); cancel(); }
  });
  input.addEventListener("blur", commit);
  input.addEventListener("pointerdown", (e) => e.stopPropagation());
  nameEditing = { commit, cancel };
  input.focus();
  input.select();
}
async function doDelete(id) {
  const p = byId.get(id); if (!p) return;
  const directs = people.filter(x => x.reportsTo === id).length;
  if (!confirm(directs ? `Delete ${p.name}? Their ${directs} direct report(s) will have their reporting line cleared.` : `Delete ${p.name}?`)) return;
  try {
    await api("DELETE", "/api/stakeholders/" + encodeURIComponent(id));
    people = people.filter(x => x.id !== id);
    people.forEach(x => { if (x.reportsTo === id) x.reportsTo = null; if (x.worksWith) x.worksWith = x.worksWith.filter(w => w !== id); });
    byId = new Map(people.map(p => [p.id, p]));
    rebuildGraphSoft(); closeDrawer(); toast("Deleted");
  } catch (e) { toast(e.message, true); }
}
function upsert(row) {
  const i = people.findIndex(x => x.id === row.id);
  if (i >= 0) people[i] = row; else people.push(row);
  byId = new Map(people.map(p => [p.id, p]));
  $("#count").textContent = people.length + " stakeholders";
}
// Rebuild edges/nodes in place but keep existing node positions for stability.
function rebuildGraphSoft() {
  // Fixed layouts (org / radial / concentric) recompute positions from scratch;
  // there's no physics to keep warm and no prior positions worth preserving.
  if (layoutMode !== "network") { initSim(); return; }
  const prevPos = new Map(nodes.map(n => [n.id, { x: n.x, y: n.y, fx: n.fx, fy: n.fy }]));
  initSim();
  for (const n of nodes) {
    const prev = prevPos.get(n.id);
    if (prev) { n.x = prev.x; n.y = prev.y; n.fx = prev.fx; n.fy = prev.fy; }
  }
  positionAll(); reheat(0.4);
}

// Fire a brief two-pulse gold flash on a card — the attention cue used right
// after its reports-visibility or focus is toggled. Because a toggle rebuilds
// the node DOM, this is called after the rebuild and re-finds the element.
function flashCard(id) {
  const n = nodes.find((x) => x.id === id);
  if (!n || !n.elm) return;
  n.elm.classList.remove("glow-flash");
  void n.elm.getBoundingClientRect(); // reflow so re-adding restarts the animation
  n.elm.classList.add("glow-flash");
  n.elm.addEventListener("animationend", () => n.elm && n.elm.classList.remove("glow-flash"), { once: true });
}

// ════════════════════════════ Drawer plumbing ════════════════════════════
function showDrawer() { $("#drawer").classList.add("open"); $("#drawer").setAttribute("aria-hidden","false"); $("#overlay").classList.add("open"); }
function closeDrawer() { $("#drawer").classList.remove("open"); $("#drawer").setAttribute("aria-hidden","true"); $("#overlay").classList.remove("open"); current = null; applyFilter(); }
let toastTimer;
function toast(msg, isErr) { const t = $("#toast"); t.textContent = msg; t.classList.toggle("err", !!isErr); t.classList.add("show"); clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove("show"), 2600); }

// ════════════════════════════ Wire up ════════════════════════════
$("#add-btn").onclick = openCreate;
$("#drawer-close").onclick = closeDrawer;
$("#overlay").onclick = closeDrawer;
$("#search").addEventListener("input", applyFilter);
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeDrawer(); });
$("#ws-toggle").onclick = (e) => { e.stopPropagation(); $("#ws-menu").classList.toggle("open"); };
document.addEventListener("click", (e) => { if (!e.target.closest(".ws-filter")) $("#ws-menu").classList.remove("open"); });
$("#edge-seg").querySelectorAll("button").forEach(b => b.onclick = () => {
  $("#edge-seg").querySelectorAll("button").forEach(x => x.classList.remove("active"));
  b.classList.add("active"); edgeMode = b.dataset.edges; applyFilter();
});
$("#zoom-in").onclick = () => zoomBy(1.2);
$("#zoom-out").onclick = () => zoomBy(0.83);
$("#zoom-fit").onclick = fitView;
$("#auto-layout").onclick = autoLayout;
let _resizeTimer = null;
window.addEventListener("resize", () => {
  const r = $("#graph").getBoundingClientRect(); W = r.width; H = r.height;
  // Fit-to-window is sized to the window, so re-wrap (debounced) as it changes.
  if (isOrgLike() && fitWindow) {
    clearTimeout(_resizeTimer);
    _resizeTimer = setTimeout(() => { initSim(); }, 120);
  }
});

// The fit toggle shows only in the org modes, and its label names the axis it
// fixes: horizontal mode fits the window HEIGHT (chart grows rightward), vertical
// fits the WIDTH (chart grows downward).
function syncFitToggle() {
  $("#fit-toggle-wrap").classList.toggle("show", isOrgLike());
  $("#fit-label").textContent = isOrgVertical() ? "Fit to width" : "Fit to height";
}
// When fit is on, movement is locked to the free (long) axis: horizontal mode
// scrolls left↔right only, vertical scrolls up↕down only. null = pan freely.
function scrollLockAxis() {
  if (!(isOrgLike() && fitWindow)) return null;
  return isOrgVertical() ? "y" : "x";   // the axis the content extends along
}

// Layout-mode slider: network map ↔ fixed org chart.
// Layout-mode segmented control: network · org · radial.
$("#mode-seg").querySelectorAll(".mode-btn").forEach((btn) => {
  btn.onclick = () => {
    if (layoutMode === btn.dataset.mode) return;
    layoutMode = btn.dataset.mode;
    $("#mode-seg").querySelectorAll(".mode-btn").forEach((b) => b.classList.toggle("active", b === btn));
    // Auto-layout (re-tidy + physics) only applies to the network map.
    $("#auto-layout").style.display = layoutMode === "network" ? "" : "none";
    syncFitToggle();
    hideCardControls();
    initSim();
    setTimeout(applyInitialView, layoutMode === "network" ? 700 : 90);
  };
});
// Fit-to-window: wrap the org chart so every box fits the window. We snap to a
// readable zoom (so "fits the window" is meaningful — at a tiny zoom everything
// already fits and nothing would wrap), then wrap rows/columns to that budget.
$("#fit-window").addEventListener("change", (e) => {
  fitWindow = e.target.checked;
  hideCardControls();
  if (fitWindow) view.k = 1;   // readable, screenshot-friendly zoom
  initSim();
  if (!fitWindow) setTimeout(fitView, 60); // unchecking: re-fit the unconstrained layout
});

// Auto-layout: forget all saved positions, re-seed from the tidy tree, and let
// the physics relax around it. Persists the fresh arrangement when it settles.
async function autoLayout() {
  try { await api("POST", "/api/stakeholders/reset-positions"); } catch (e) {}
  for (const p of people) { p.posX = null; p.posY = null; }
  initSim();          // re-seeds tidy (no saved positions now) and reheats
  setTimeout(fitView, 700);
  toast("Re-tidied the layout");
}

bindStagePan();
// Auto-layout only applies to the network map; hidden in the default org mode.
$("#auto-layout").style.display = layoutMode === "network" ? "" : "none";
syncFitToggle(); // org is the default mode
load().catch(err => { $("#loading").textContent = "Could not load stakeholders: " + err.message; });
</script>
</body>
